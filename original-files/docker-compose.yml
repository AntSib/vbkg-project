version: '3.8'

services:
  library-events:
    build:
      context: .
      dockerfile: vbkg.Dockerfile
    image: library-events
    container_name: library-events-container
    expose:
      - "3000"  # Проброс порта внутри сети Docker
    environment:
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - PORT=${PORT}
    volumes:
      # Монтируем том для хранения данных
      - db_data:/usr/src/app/data
      # Монтируем .env файл из хост-системы
      - .env:/usr/src/app/server/.env
      # Монтируем том для хранения изображений
      - server_uploads:/usr/src/app/server/uploads
    restart: unless-stopped
  web:
    build:
      context: .
      dockerfile: nginx.Dockerfile
    image: nginx-library-events
    container_name: nginx-library-events-container
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./acme:/etc/nginx/acme
      - ./vbkg-pr-cbs-ru-ssl.conf:/etc/nginx/conf.d/vbkg-pr-cbs-ru-ssl.conf
      - /home/library-events/certs2/live/vbkg.pr-cbs.ru/fullchain.pem:/etc/letsencrypt/live/vbkg.pr-cbs.ru/fullchain.pem
      - /home/library-events/certs2/live/vbkg.pr-cbs.ru/privkey.pem:/etc/letsencrypt/live/vbkg.pr-cbs.ru/privkey.pem
    depends_on:
      - library-events

volumes:
  db_data:
    name: library-events-db-data
  server_uploads:
    name: library-events-server-uploads

