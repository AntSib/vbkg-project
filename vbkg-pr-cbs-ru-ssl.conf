server {
    listen 443 ssl;
    server_name vbkg.pr-cbs.ru www.vbkg.pr-cbs.ru;

    # Пути к сертификатам Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/vbkg.pr-cbs.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vbkg.pr-cbs.ru/privkey.pem;

    # Рекомендуемые настройки безопасности
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Проксируем все запросы на Node.js
    location / {
        proxy_pass http://library-events:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;  # Важно: указываем, что соединение HTTPS
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        proxy_set_header Referer "";
    }
}

