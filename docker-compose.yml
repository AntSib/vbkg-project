services:
  library-events:
  # TODO:
  #   - добавить $SERTIFICATE_EMAIL на сервере
  #   - уточнить причину не hard-coded PORT=3000
    build:
      context: .
      dockerfile: vbkg.Dockerfile
    image: library-events
    container_name: library-events-container
    expose:
      - "3000"  # Проброс порта внутри сети Docker
    environment:
      - VIRTUAL_HOST=vbkg.pr-cbs.ru,www.vbkg.pr-cbs.ru
      - LETSENCRYPT_HOST=vbkg.pr-cbs.ru,www.vbkg.pr-cbs.ru
      - LETSENCRYPT_EMAIL=${SERTIFICATE_EMAIL}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - PORT=${PORT}
    volumes:
      # Монтируем том для хранения данных
      - db_data:/usr/src/app/data
      # Монтируем .env файл из хост-системы
      - .env:/usr/src/app/server/.env
      # Монтируем том для хранения изображений
      - server_uploads:/usr/src/app/server/uploads
    # restart: unless-stopped

  nginx-proxy: # Замена nginx для работы с acme-companion
    build:
      context: ./nginx-proxy
      dockerfile: nginx-proxy.Dockerfile
    container_name: nginx-proxy
    depends_on:
      - library-events
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
    # restart: unless-stopped

  acme-companion: # Контейнер для автоматической сертификации
  # TODO:
  #   - добавить $SERTIFICATE_EMAIL на сервере
    image: nginxproxy/acme-companion
    container_name: nginx-proxy-acme
    depends_on:
      - nginx-proxy
    env_file:
      - .env
    environment:
      - DEFAULT_EMAIL=${SERTIFICATE_EMAIL}
    volumes_from:
      - nginx-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
      - acme:/etc/acme.sh
    # restart: unless-stopped

volumes:
  acme:
  certs:
  vhost:
  html:
  db_data:
    name: library-events-db-data
  server_uploads:
    name: library-events-server-uploads
