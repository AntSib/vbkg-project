services:
  library-events:
  # TODO:
  #   - Упаковать файлы в отдельную директорию
  #   - добавить $DEFAULT_EMAIL на сервере
    build:
      context: ./vbkg
      dockerfile: vbkg.Dockerfile
    image: library-events
    container_name: library-events-container
    expose:
      - "3000"  # Проброс порта внутри сети Docker\
    environment:
      # Виртуальный хост сервера
      - VIRTUAL_HOST=${VIRTUAL_HOST}
      # Хост для сертификации acme-companion
      - LETSENCRYPT_HOST=${LETSENCRYPT_HOST}
      # Почта для сертификации
      - LETSENCRYPT_EMAIL=${SERTIFICATE_EMAIL}
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - PORT=${PORT}
    volumes:
      # Монтируем том для хранения данных
      - db_data:/usr/src/app/data
      # Монтируем .env файл из хост-системы
      - /vbkg/.env:/usr/src/app/server/.env
      # Монтируем том для хранения изображений
      - server_uploads:/usr/src/app/server/uploads
    # restart: unless-stopped

  nginx-proxy: # Замена nginx  на nginx-proxy для работы с acme-companion
    build:
      context: ./nginx-proxy
      dockerfile: nginx-proxy.Dockerfile
    container_name: nginx-proxy
    depends_on:
      - library-events
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      # Том для хранения сертификатов
      - certs:/etc/nginx/certs
      # Том для хранения виртуальных хостов
      - vhost:/etc/nginx/vhost.d
      # Том для хранения статики
      - html:/usr/share/nginx/html
    restart: unless-stopped

  acme-companion: # Контейнер автоматической сертификации
  # TODO:
  #   - добавить $DEFAULT_EMAIL на сервере
  #   - создать и подключить параметры из .env !!! (при развётрывании не было чтения)
    image: nginxproxy/acme-companion

    container_name: nginx-proxy-acme
    depends_on:
      - nginx-proxy
    environment:
      # Почта для сертификации
      - DEFAULT_EMAIL=${SERTIFICATE_EMAIL}
    volumes_from:
      # Подключаем томы из nginx-proxy
      - nginx-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Том для хранения сертификатов
      - certs:/etc/nginx/certs
      # Том для хранения виртуальных хостов для сертификации
      - vhost:/etc/nginx/vhost.d
      # Том для хранения статики
      - html:/usr/share/nginx/html
      - acme:/etc/acme.sh
    restart: unless-stopped

volumes:
  acme:
  certs:
  vhost:
  html:
  db_data:
    name: library-events-db-data
  server_uploads:
    name: library-events-server-uploads
