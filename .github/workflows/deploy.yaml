name: Production Deploy

on:
  push:
    branches:
      - production

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Настройка SSH
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Ensure known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      # Создание бэкапа
      - name: Create backup on server
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            
            set -e

            BASE_DIR="\$HOME/vbkg"
            TIMESTAMP=\$(date +%Y%m%d_%H%M%S)
            BACKUP_FILE="backup_\${TIMESTAMP}.tar.gz"

            mkdir -p "\$BASE_DIR"
            cd "\$BASE_DIR"

            if [ "\$(ls -A . 2>/dev/null)" ]; then
              tar -czf "\$BACKUP_FILE" .
            fi

            touch .env

            update_env_var () {
              VAR_NAME=\$1
              VAR_VALUE=\$2
              if grep -q "^\${VAR_NAME}=" .env; then
                sed -i "s|^\${VAR_NAME}=.*|\${VAR_NAME}=\${VAR_VALUE}|" .env
              else
                echo "\${VAR_NAME}=\${VAR_VALUE}" >> .env
              fi
            }

            update_env_var "VIRTUAL_HOST" "${{ secrets.VIRTUAL_HOST }}"
            update_env_var "LETSENCRYPT_HOST" "${{ secrets.LETSENCRYPT_HOST }}"
            update_env_var "LETSENCRYPT_EMAIL" "${{ secrets.LETSENCRYPT_EMAIL }}"
            update_env_var "PORT" "${{ secrets.PORT }}"
          EOF

      # Синхронизирование файлов
      - name: Rsync project to server
        run: |
          rsync -az --delete \
            --exclude '.git' \
            --exclude '.github' \
            ./ \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:~/vbkg/

      # Запуск контейнера
      - name: Deploy Docker
        id: deploy_step
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << EOF
            set -e
            cd ~/vbkg

            docker compose down
            docker compose up --build -d

            rm -f vbkg_server/vbkg-pr-cbs-ru-ssl.conf
            rm -f nginx-proxy/conf.d/nginx.conf

            # Remove old backups (keep newest)
            ls -t backup_*.tar.gz | tail -n +2 | xargs -r rm -f
          EOF

      # Rollback при ошибке
      - name: Rollback if failed
        if: failure()
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << EOF
            cd ~/vbkg

            echo "Deployment failed. Starting rollback..."

            LATEST_BACKUP=\$(ls -t backup_*.tar.gz | head -n 1)

            if [ -f "\$LATEST_BACKUP" ]; then
              tar -xzf "\$LATEST_BACKUP"
              docker compose down || true
              docker compose up --build -d
              echo "Rollback completed."
            else
              echo "No backup found."
            fi
          EOF
